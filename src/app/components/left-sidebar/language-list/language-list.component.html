<div class="section">

  <div class="rw">
    <div class="bg-icon-3">
      <i class="fa-solid fa-globe icon-3"></i>
    </div>
    <div class="text-5">LANGUAGE</div>
  </div>

  <div class="language-fl">
    @if (languages && languages.length > 0) {
      @for (lang of languages; track lang) {
        <div class="lang">{{ lang }}</div>
      }
    } @else {
      <div class="lang">—</div>
    }
  </div>

</div>
