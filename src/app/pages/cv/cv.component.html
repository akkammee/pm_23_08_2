<div class="container">
    @if (errorMessage) {
        <div class="error-banner">⚠️ {{ errorMessage }}</div>
    }

    @if (isLoading) {
        <div class="loading">Завантаження даних...</div>
    }

    @if (resume && !isLoading) {
        <button class="logout-btn" (click)="logout()">Вийти</button>

        <div class="row px-0">
            <div class="col-12 px-0">
                <app-header
                        [firstName]="resume.header.firstName"
                        [lastName]="resume.header.lastName"
                        [position]="resume.header.position"
                        [photoUrl]="resume.header.photoUrl"
                        [phones]="resume.header.phones"
                        [website]="resume.header.website"
                        [email]="resume.header.email"
                        [address]="resume.header.address"
                        [city]="resume.header.city"
                />
            </div>
        </div>

        <div class="row px-0">
            <div class="col-5 px-0 left-bg">
                <app-left-sidebar
                        [aboutText]="resume.sidebar.aboutText"
                        [skills]="resume.sidebar.skills"
                        [languages]="resume.sidebar.languages"
                        [hobbies]="resume.sidebar.hobbies"
                />
            </div>
            <div class="col-7 px-0">
                <app-right-content
                        [educationItems]="resume.content.education"
                        [references]="resume.content.references"
                        [jobItems]="resume.content.jobExperience"
                />
            </div>
        </div>
    }
</div>
